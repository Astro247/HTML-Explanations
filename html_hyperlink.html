<!--Un hyperlink è un'elemento cliccabile contenente un link in un documento che porta ad un'altra pagina.-->
<!DOCTYPE html>
<html>
    <head>
        <title>Link Google</title>
    </head>
    <body>
        <a href="https://www.google.com" target="_blank" title="This is a Google's ref"> <!--La funzione <a> al suo interno contiene il testo che verrà utilizzato come link-->
        Google's Link:
        </a> <!--In questo caso, "Google's Link" è la linea di testo che contiene un link, il keyword argument "href" determina il link alla pagine a cui si verrà collegati una volta premuto il testo, il keyword argument "target" impostato a "_blank" indica che una volta premuto il link verrà aperta una nuova pagina e infine "title" indica il testo che appare mentre si rimane fermi con il mouse sopra il testo che funge da link.-->

        <p>
        For more information <a href="email_random@gmail.com" target="_self" title="Send you to my gmail concact"> contact me </a>    
        </p> <!--Discorso identico in questo caso, ma il keyword argument "target" è impostato a "_self", il che significa che non verrà creata una nuova pagina ma la pagina su cui si è verrà "sostituita" con la nuova-->
    </body>
</html>

<!--E' possibile riferirsi anche a file .html presenti nella stessa cartella del file .html dove è presente l'href-->
