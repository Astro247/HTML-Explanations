<!--In HTML, per formattare il testo (ad esempio in grassetto, corsivo, ecc.), si utilizzano dei tag specifici che racchiudono il testo da formattare.-->
<!DOCTYPE html>
<html>
    <head>
        <title>Formatted text</title>
    </head>
    <body>
        <h1>Formatted Text!</h1>
        <p>
            This text contains a word formatted with <b>bold</b>
            Then a word written in <i>italic</i>, then a <small>small</small>
            word and a <big>big</big> word, a <sub>subscript</sub> word, a <sup>superscript</sup> word,
            a <ins>underlined</ins> word, a <del>deleted</del> word and lastly a <mark>marked</mark> word.
        </p>
    </body>
</html>

<!--Le possibili modifiche di formattazione che si possono applicare a del testo sono:
1) <b> per "bold", quindi rendere quella parte di testo in grassetto.
2) <i> per "italic", dunque per rendere, appunto, il testo in italic.
3) <small> per rendere il testo piccolo.
4) <big> per rendere il testo grande.
5) <sub> per rendere il testo "abbassato" rispetto a dove dovrebbe essere.
6) <sup> opposto di <sub>, rende il testo più "alzato" rispetto a dove dovrebbe essere.
7) <ins> rende il testo sottolineato.
8) <del> rende quella parte di testo barrata da una linea orizzontale.
9) <mark> per sottolineare quella parte di testo.-->
